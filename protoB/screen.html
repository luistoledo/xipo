<html>
<head>
    <title>XIPO - proto B</title>
    <link rel="stylesheet" href="./style.css">

    <script src="https://cdn.jsdelivr.net/npm/figlet@1.11.0/importable-fonts/Standard.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/tween.js/23.1.3/tween.umd.js"></script>

    <meta name="viewport" content="width=device-width, initial-scale=3.0, user-scalable=no" />

</head>
<body>
    <div class="menu-bar">
        <div class="apple-logo"></div>
        <div class="menu-item">Archivo</div>
        <div class="menu-item">Editar</div>
        <div class="menu-item">Ver</div>
    </div>

    <div class="desktop-icon" onclick="openPoke()" style="top: 100px; left: 20px;"><div class="icon-label">poke.txt</div></div>
    <div class="desktop-icon" onclick="openFtp()" style="top: 90px; left: 100px;"><div class="icon-label">ftp</div></div>

    <div class="window">    
        <div class="title-bar">
            <div class="minimize-button"></div>
            <div class="maximize-button"></div>
            <div class="title">poke.txt</div>
            <div class="close-button"></div>
        </div>
        <div class="content">
            This is a window content area.
        </div>
    </div>


    <script>
        const VIEWPORTSCALE = 1.4;
      	const {Tween, Easing, Group /*, ...*/} = TWEEN

        const windowElement = document.querySelector('.window');
        const windowTitle = windowElement.querySelector('.title-bar');
        const closeButton = document.querySelector('.close-button');
        const minimizeButton = document.querySelector('.minimize-button');
        const maximizeButton = document.querySelector('.maximize-button');
        const topMenuBar = document.querySelector('.menu-bar');
        const dock = document.querySelector('.dock');

        let isDragging = false;
        let offsetX, offsetY;
        
        //////////////////////////////////////////////////////////
        // Window movement
        windowTitle.addEventListener('mousedown', (e) => {
            isDragging = true;
            offsetX = e.clientX - windowElement.offsetLeft;
            offsetY = e.clientY - windowElement.offsetTop;
        });

        document.addEventListener('mousemove', (e) => {
            if (isDragging) {
                windowElement.style.left = `${e.clientX - offsetX}px`;
                windowElement.style.top = `${e.clientY - offsetY}px`;
            }
        });

        document.addEventListener('mouseup', () => {
            isDragging = false;
        });

        //////////////////////////////////////////////////////////
        // window control buttons
        closeButton.addEventListener('click', () => {
            // animateResizeWindow({ top: windowElement.offsetHeight / 2, left: windowElement.offsetTop / 2, width: 0, height: 0 }, 300);
            windowElement.style.display = 'none';
        });

        minimizeButton.addEventListener('click', () => {
            let h = '';
            let d = '';
            if (windowElement.style.height === '30px') {
                h = '500px';
                d = 'block';
            } else {
                h = '30px';
                d = 'none';
            }
            windowElement.style.height = h;
            windowElement.querySelector('.content').style.display = d;
        });

        let prevSize = { width: 700, height: 500, top: 50, left: 50, update(){
            prevSize.width = parseInt(windowElement.style.width) || 700;
            prevSize.height = parseInt(windowElement.style.height) || 500;
            prevSize.top = parseInt(windowElement.style.top) || 50;
            prevSize.left = parseInt(windowElement.style.left) || 50;
        } };

        maximizeButton.addEventListener('click', () => {
            const marg = 10;
            let w, h, t, l;

            if (parseInt(windowElement.style.width) >= (window.innerWidth/VIEWPORTSCALE) - marg - marg - 2) {
                console.log('restore' + JSON.stringify(prevSize));
                // restore
                w = prevSize.width;
                h = prevSize.height;
                t = prevSize.top;
                l = prevSize.left;
            } else { // maximize
                prevSize.update();
                console.log('maximize' + JSON.stringify(prevSize));

                w = Math.max((window.innerWidth/VIEWPORTSCALE) - marg - marg, 700);
                h = Math.max((window.innerHeight/VIEWPORTSCALE) - topMenuBar.offsetHeight - marg - marg, 500);
                t = topMenuBar.offsetHeight + marg;
                l = marg;
            }
            updateWindowRect({ top: t, left: l, width: w, height: h });
        });

        function openPoke() {
            prevSize.update();
            let goalSize = { top:0, left:0, width:0, height:0 };
            goalSize.left = window.innerWidth / 2 - windowElement.offsetWidth / 2 ;
            goalSize.top = window.innerHeight / 2 - windowElement.offsetHeight / 2 ;
            goalSize.width = 0;
            goalSize.height = 0;
            updateWindowRect(goalSize);
            windowElement.style.display = 'block';
            animateResizeWindow(prevSize, 500);
        }

        function updateWindowRect({ top, left, width, height }) {
            windowElement.style.top = top + 'px';
            windowElement.style.left = left + 'px';
            windowElement.style.width = width + 'px';
            windowElement.style.height = height + 'px';
        }

        function animateResizeWindow({ top, left, width, height }, duration = 500, onComplete) {
            const startRect = {
                top: parseInt(windowElement.style.top) || 50,
                left: parseInt(windowElement.style.left) || 50,
                width: parseInt(windowElement.style.width) || 500,
                height: parseInt(windowElement.style.height) || 700
            };
            const goalRect = { top, left, width, height };
            const animResize = new Tween(startRect)
                .to(goalRect, duration)
                .easing(Easing.Elastic.Out)
                .onUpdate(() => {
                    updateWindowRect(startRect);
                })
                .onComplete(() => {
                    if (onComplete) onComplete();
                })
                .start();
            function animate(time) {
        		animResize.update(time);
                requestAnimationFrame(animate);
            }
            requestAnimationFrame(animate);
        }

        ///////////////////////////////////////////////////////////

    </script>

</body>
</html>
